# /etc/nginx/conf.d/llm-wiki.conf
#
# llm-wiki 静态站（Quartz 生成）
# 部署目录: /var/www/llm-wiki/
#
# 安装步骤:
#   1. 将 server_name / root 改成你的实际域名和部署目录
#   2. 上传到服务器: scp nginx-llm-wiki.conf user@server.example.com:/etc/nginx/conf.d/llm-wiki.conf
#   3. 测试配置:     ssh user@server.example.com 'nginx -t'
#   4. 重载:         ssh user@server.example.com 'systemctl reload nginx'
#   5. 申请 HTTPS:   ssh user@server.example.com 'certbot --nginx -d wiki.example.com'
#      （certbot 会自动追加 443 server block 并配置 80→443 跳转）

server {
    listen       80;
    listen       [::]:80;
    server_name  wiki.example.com;

    root         /var/www/llm-wiki;
    index        index.html;

    # 安全头
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-Frame-Options          "SAMEORIGIN" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # Quartz 输出 <name>.html 而非目录，URL 自动补 .html
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # 静态资源长缓存
    location ~* \.(css|js|woff2?|ttf|otf|svg|png|jpg|jpeg|gif|webp|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # 隐藏 nginx 版本
    server_tokens off;

    # 访问日志
    access_log /var/log/nginx/llm-wiki.access.log main;
    error_log  /var/log/nginx/llm-wiki.error.log warn;
}
